<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree & Shriyan Dhaba POS - Sync Enabled</title>
<style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg,#ff9800,#ff5722); padding:10px; margin:0; }
    .container { max-width:500px; margin:auto; background:white; padding:15px; border-radius:15px; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
    h2 { text-align:center; color:#d84315; margin:10px 0; }
    h3, h4 { color:#d84315; }
    input, select, button { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box; }
    button { background:#2e7d32; color:white; border:none; font-size:16px; cursor:pointer; }
    button:hover { opacity:0.9; }
    .total { font-size:22px; font-weight:bold; color:#d84315; text-align:center; margin:15px 0; }
    .menu-item { display:flex; align-items:center; justify-content:space-between; background:#fff3e0; border:2px solid #ff9800; border-radius:10px; padding:12px; margin:10px 0; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th, td { padding:8px; text-align:left; border-bottom:1px solid #ddd; }
    .logo img { width:100px; display:block; margin:auto; }
    .refresh-btn { background:#ff9800; margin:10px 0; }
</style>
</head>
<body>
<div class="container">

    <!-- STAFF POS -->
    <div id="staffView">
        <div class="logo"><img src="LOGO.png" alt="Logo"><h2>Shree & Shriyan Dhaba</h2><p style="text-align:center;color:#d84315;font-weight:bold;">STAFF POS</p></div>

        <input id="customerName" placeholder="Customer Name (optional)">
        <input id="invoice" readonly value="INV001">

        <select id="item"></select>
        <input id="qty" type="number" value="1">

        <button onclick="addItem()">➕ Add Item</button>

        <table border="1"><thead><tr><th>Item</th><th>Qty</th><th>Amt</th><th>X</th></tr></thead><tbody id="bill"></tbody></table>

        <label><input type="checkbox" id="gst" checked> GST 5%</label>
        <div class="total">Total: ₹ <span id="total">0</span></div>

        <button onclick="printBill()">🧾 Print Bill</button>

        <h4>Manage Menu (Firebase Real-time)</h4>
        <input id="newItemName" placeholder="New Item Name">
        <input id="newItemPrice" type="number" placeholder="Price (₹)">
        <button onclick="addNewMenuItem()" style="background:#ff9800;">➕ Add / Update Item</button>
        <button onclick="refreshMenu()" style="background:#666;">🔄 Refresh Menu</button>

        <h4>Generate QR for Table</h4>
        <input id="qrTableNum" type="number" placeholder="Table Number">
        <button onclick="generateQRCode()" style="background:#ff9800;">📱 Generate QR</button>
        <div id="qrContainer" style="text-align:center;margin:15px 0;"></div>
    </div>

    <!-- CUSTOMER VIEW -->
    <div id="customerView" style="display:none;">
        <div class="logo"><img src="LOGO.png" alt="Logo"><h2>Shree & Shriyan Dhaba</h2><p style="text-align:center;color:#2e7d32;font-weight:bold;">TABLE ORDERING</p></div>

        <div id="signInSection">
            <h3 style="text-align:center;">Welcome!</h3>
            <input id="custTable" type="number" placeholder="Your Table Number">
            <input id="custName" placeholder="Your Name (optional)">
            <button onclick="joinTable()" style="background:#d84315;font-size:18px;">✅ Start Ordering</button>
        </div>

        <div id="menuSection" style="display:none;">
            <h3 style="text-align:center;">Menu for Table <span id="displayTable" style="color:#d84315;"></span></h3>
            <p style="text-align:center;">Hello, <span id="displayName"></span>!</p>
            
            <button onclick="refreshCustomerMenu()" class="refresh-btn">🔄 Refresh Menu Now</button>
            <div id="menuItems">Loading menu from Firebase...</div>

            <h3>Your Order</h3>
            <table border="1"><thead><tr><th>Item</th><th>Qty</th><th>Amt</th><th>X</th></tr></thead><tbody id="customerBill"></tbody></table>
            <div class="total">Your Total: ₹ <span id="custTotal">0</span></div>

            <button onclick="placeCustomerOrder()" style="background:#d84315;">✅ Place Order</button>
            <button onclick="clearCustomerOrder()" style="background:#666;">🗑️ Clear Cart</button>
        </div>
    </div>
</div>

<div id="successToast" class="success-toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ====================== FIREBASE SETUP ======================
let db = null;
let items = [];

function initFirebase() {
  try {
    const config = {
      apiKey: "AIzaSyCOtpaUWrVF6yAsHv9b-gj_OA0p5_hWAQ4",
      authDomain: "dhaba-bills.firebaseapp.com",
      databaseURL: "https://dhaba-bills-default-rtdb.firebaseio.com",
      projectId: "dhaba-bills"
    };
    firebase.initializeApp(config);
    db = firebase.database();
    console.log("✅ Firebase connected successfully");
    loadMenuFromFirebase();
  } catch(e) {
    console.error("Firebase init error:", e);
    alert("Failed to connect to Firebase. Please refresh the page.");
  }
}

// Load + Listen to Menu
function loadMenuFromFirebase() {
  if (!db) return;

  db.ref('menu').on('value', (snapshot) => {
    console.log("🔄 Menu data received from Firebase");
    const data = snapshot.val();
    items = data ? Object.values(data) : [
      {name:"Aloo Paratha", price:50},
      {name:"Paneer Butter Masala", price:180},
      {name:"Dal Tadka", price:150},
      {name:"Naan", price:40}
    ];

    renderStaffMenu();
    if (document.getElementById("menuSection").style.display !== "none") {
      loadCustomerMenu();
    }
  });
}

function saveMenu() {
  if (!db) return alert("Firebase not connected");
  const menuObj = {};
  items.forEach((item, i) => menuObj[i] = item);
  db.ref('menu').set(menuObj).then(() => {
    console.log("✅ Menu saved to Firebase");
  }).catch(err => console.error("Save error:", err));
}

function renderStaffMenu() {
  const select = document.getElementById("item");
  select.innerHTML = '<option value="">-- Select Item --</option>';
  items.forEach((item, idx) => {
    select.innerHTML += `<option value="${idx}">${item.name} - ₹${item.price}</option>`;
  });
}

function addNewMenuItem() {
  const name = document.getElementById("newItemName").value.trim();
  const price = parseFloat(document.getElementById("newItemPrice").value);
  if (!name || isNaN(price)) return alert("Enter valid name and price");

  const existing = items.findIndex(i => i.name.toLowerCase() === name.toLowerCase());
  if (existing !== -1) {
    items[existing].price = price;
  } else {
    items.push({name, price});
  }

  saveMenu();
  alert("Item added/updated! Check customer page.");
}

// Customer Side
let customerOrder = [];
let currentTable = '';
let currentName = '';

function joinTable() {
  currentTable = document.getElementById("custTable").value.trim();
  currentName = document.getElementById("custName").value.trim() || "Guest";
  if (!currentTable) return alert("Please enter Table Number");

  document.getElementById("signInSection").style.display = "none";
  document.getElementById("menuSection").style.display = "block";
  document.getElementById("displayTable").innerText = currentTable;
  document.getElementById("displayName").innerText = currentName;

  loadCustomerMenu();
}

function loadCustomerMenu() {
  let html = '';
  items.forEach((item, idx) => {
    html += `<div class="menu-item">
      <span><strong>${item.name}</strong> <small>₹${item.price}</small></span>
      <button onclick="addCustomerItem(${idx})" style="background:#2e7d32;padding:8px 16px;border-radius:6px;">+ Add</button>
    </div>`;
  });
  document.getElementById("menuItems").innerHTML = html || "<p>No items yet.</p>";
}

function refreshCustomerMenu() {
  alert("Refreshing menu from Firebase...");
  if (db) db.ref('menu').once('value').then(s => {
    const data = s.val();
    if (data) items = Object.values(data);
    loadCustomerMenu();
  });
}

function addCustomerItem(idx) {
  const item = items[idx];
  const existing = customerOrder.find(o => o.name === item.name);
  if (existing) existing.qty += 1;
  else customerOrder.push({...item, qty:1});
  renderCustomerOrder();
}

function renderCustomerOrder() {
  let html = "", total = 0;
  customerOrder.forEach((b, i) => {
    const t = b.qty * b.price;
    total += t;
    html += `<tr><td>${b.name}</td><td>${b.qty}</td><td>₹${t}</td><td onclick="delCustomerItem(${i})" style="color:red;cursor:pointer;">❌</td></tr>`;
  });
  document.getElementById("customerBill").innerHTML = html;
  document.getElementById("custTotal").innerText = total.toFixed(2);
}

function delCustomerItem(i) { customerOrder.splice(i,1); renderCustomerOrder(); }
function clearCustomerOrder() { if(confirm("Clear cart?")) { customerOrder=[]; renderCustomerOrder(); } }

function placeCustomerOrder() {
  if (customerOrder.length === 0) return alert("Cart is empty!");
  alert(`✅ Order Placed for Table ${currentTable}`);
  customerOrder = [];
  renderCustomerOrder();
}

// QR Code
function generateQRCode() {
  const tableNo = document.getElementById("qrTableNum").value.trim();
  if (!tableNo) return alert("Enter table number");
  const base = window.location.href.split('?')[0];
  const link = `${base}?mode=customer&table=${tableNo}`;
  const qr = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(link)}`;
  document.getElementById("qrContainer").innerHTML = `<img src="${qr}" style="width:280px;border:8px solid #d84315;border-radius:12px;"><p>Table ${tableNo} QR Code</p>`;
}

function printQRCode() { window.print(); }

// Basic staff functions
function addItem() { alert("Item added to bill (demo)"); }
function printBill() { window.print(); }

// Initialize
function initializeApp() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('mode') === 'customer') {
    document.getElementById('staffView').style.display = 'none';
    document.getElementById('customerView').style.display = 'block';
    const t = params.get('table');
    if (t) document.getElementById('custTable').value = t;
  }
  initFirebase();
}

initializeApp();
</script>
</body>
</html>
