<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree & Shriyan Dhaba POS - Sync Enabled</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9800, #ff5722);
        padding: 10px;
        margin: 0;
    }
    .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    h2 { text-align: center; color: #d84315; margin: 10px 0; }
    h3, h4 { color: #d84315; }
    input, select, button {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border-radius: 8px;
        border: 1px solid #ddd;
        box-sizing: border-box;
    }
    button {
        background: #2e7d32;
        color: white;
        border: none;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .total {
        font-size: 22px;
        font-weight: bold;
        color: #d84315;
        text-align: center;
        margin: 15px 0;
    }
    .menu-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #fff3e0;
        border: 2px solid #ff9800;
        border-radius: 10px;
        padding: 12px;
        margin: 10px 0;
    }
    .success-toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #2e7d32;
        color: white;
        padding: 14px 24px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        z-index: 1000;
        display: none;
        font-weight: bold;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    .logo img { width: 100px; display: block; margin: auto; }

    /* Print QR Section */
    #printQRSection {
        display: none;
        text-align: center;
        padding: 20px;
        border: 3px dashed #d84315;
        margin: 15px 0;
        background: white;
    }
    @media print {
        body * { visibility: hidden; }
        #printQRSection, #printQRSection * { visibility: visible; }
        #printQRSection {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            display: block;
        }
        .container, button, input, #staffView, #customerView { display: none !important; }
    }
</style>
</head>
<body>
<div class="container">

    <!-- STAFF POS VIEW -->
    <div id="staffView">
        <div class="logo">
            <img src="LOGO.png" alt="Logo">
            <h2>Shree & Shriyan Dhaba</h2>
            <p style="text-align:center;color:#d84315;font-weight:bold;">STAFF POS</p>
        </div>

        <input id="customerName" placeholder="Customer Name (optional)">
        <input id="invoice" readonly>

        <select id="item"></select>
        <input id="qty" type="number" placeholder="Qty" value="1">

        <button onclick="addItem()">➕ Add Item</button>
        <button onclick="voiceAdd()">🎤 Voice Add</button>

        <table border="1">
            <thead><tr><th>Item</th><th>Qty</th><th>Amt</th><th>X</th></tr></thead>
            <tbody id="bill"></tbody>
        </table>

        <label><input type="checkbox" id="gst" checked> GST 5%</label>
        <div class="total">Total: ₹ <span id="total">0</span></div>

        <button onclick="printBill()">🧾 Print Bill</button>
        <button onclick="exportExcel()">📊 Export Excel</button>
        <button onclick="sendWhatsApp()">📲 WhatsApp</button>
        <button onclick="dailyReport()">📊 Daily Report</button>
        <button onclick="showTableOrders()" style="background:#d84315;">📋 Live Table Orders</button>

        <h4>Manage Menu (Real-time)</h4>
        <input id="newItemName" placeholder="New Item Name">
        <input id="newItemPrice" type="number" placeholder="Price (₹)">
        <button onclick="addNewMenuItem()" style="background:#ff9800;">➕ Add / Update Item</button>
        <button onclick="showCurrentMenu()" style="background:#666;">📋 Show Current Menu</button>

        <h4>Generate & Print Table QR Code</h4>
        <input id="qrTableNum" type="number" placeholder="Table Number (e.g. 5)">
        <button onclick="generateQRCode()" style="background:#ff9800;">📱 Generate QR Code</button>
        
        <div id="qrContainer" style="text-align:center;margin:15px 0;"></div>
        
        <!-- Print Button -->
        <button onclick="printQRCode()" style="background:#d84315;">🖨️ Print This QR Code</button>

        <div id="printQRSection">
            <h2>Shree & Shriyan Dhaba</h2>
            <p style="font-size:18px; font-weight:bold;">Scan to Order</p>
            <div id="printQRImage"></div>
            <p id="printTableText" style="font-size:20px; margin:10px 0; color:#d84315;"></p>
            <p style="margin-top:20px; font-size:14px;">Thank you for visiting!</p>
        </div>

        <div id="ordersPanel" style="display:none;"></div>
    </div>

    <!-- CUSTOMER VIEW (unchanged) -->
    <div id="customerView" style="display:none;">
        <div class="logo">
            <img src="LOGO.png" alt="Logo">
            <h2>Shree & Shriyan Dhaba</h2>
            <p style="text-align:center;color:#2e7d32;font-weight:bold;">TABLE ORDERING</p>
        </div>

        <div id="signInSection">
            <h3 style="text-align:center;">Welcome!</h3>
            <input id="custTable" type="number" placeholder="Your Table Number">
            <input id="custName" placeholder="Your Name (optional)">
            <button onclick="joinTable()" style="background:#d84315;font-size:18px;">✅ Start Ordering</button>
        </div>

        <div id="menuSection" style="display:none;">
            <h3 style="text-align:center;">Menu for Table <span id="displayTable" style="color:#d84315;"></span></h3>
            <p style="text-align:center;">Hello, <span id="displayName"></span>!</p>
            
            <button onclick="refreshCustomerMenu()" style="background:#ff9800;">🔄 Refresh Menu</button>
            
            <div id="menuItems"></div>

            <h3>Your Order</h3>
            <table border="1">
                <thead><tr><th>Item</th><th>Qty</th><th>Amt</th><th>X</th></tr></thead>
                <tbody id="customerBill"></tbody>
            </table>
            <div class="total">Your Total: ₹ <span id="custTotal">0</span></div>

            <button onclick="placeCustomerOrder()" style="background:#d84315;">✅ Place Order for Kitchen</button>
            <button onclick="clearCustomerOrder()" style="background:#666;">🗑️ Clear Cart</button>
        </div>
    </div>
</div>

<div id="successToast" class="success-toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ====================== FIREBASE & MENU (same as before) ======================
const firebaseConfig = { /* your config */ 
  apiKey: "AIzaSyCOtpaUWrVF6yAsHv9b-gj_OA0p5_hWAQ4",
  authDomain: "dhaba-bills.firebaseapp.com",
  databaseURL: "https://dhaba-bills-default-rtdb.firebaseio.com",
  projectId: "dhaba-bills",
  storageBucket: "dhaba-bills.firebasestorage.app",
  messagingSenderId: "1044375723943",
  appId: "1:1044375723943:web:828c2351f76858f870e082"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let items = [];

function loadAndListenMenu() {
  db.ref('menu').on('value', (snapshot) => {
    const data = snapshot.val();
    items = data ? Object.values(data) : [
      {name: "Aloo Paratha", price: 50},
      {name: "Paneer Butter Masala", price: 180},
      {name: "Dal Tadka", price: 150},
      {name: "Naan", price: 40}
    ];
    renderStaffMenu();
    if (document.getElementById("menuSection").style.display !== "none") loadCustomerMenu();
  });
}

function saveMenu() {
  const menuObj = {};
  items.forEach((item, i) => menuObj[i] = item);
  db.ref('menu').set(menuObj);
}

function renderStaffMenu() {
  const select = document.getElementById("item");
  select.innerHTML = '<option value="">-- Select Item --</option>';
  items.forEach((item, idx) => {
    select.innerHTML += `<option value="${idx}">${item.name} - ₹${item.price}</option>`;
  });
}

function addNewMenuItem() {
  const name = document.getElementById("newItemName").value.trim();
  const price = parseFloat(document.getElementById("newItemPrice").value);
  if (!name || isNaN(price)) return alert("Please enter valid name and price");

  const existing = items.findIndex(i => i.name.toLowerCase() === name.toLowerCase());
  if (existing !== -1) {
    items[existing].price = price;
  } else {
    items.push({name, price});
  }
  saveMenu();
  alert("Menu updated successfully!");
}

function showCurrentMenu() {
  let msg = "Current Menu:\n\n";
  items.forEach(i => msg += `• ${i.name} - ₹${i.price}\n`);
  alert(msg);
}

function refreshCustomerMenu() {
  db.ref('menu').once('value', (snapshot) => {
    const data = snapshot.val();
    if (data) items = Object.values(data);
    loadCustomerMenu();
  });
  alert("Menu refreshed!");
}

// ====================== QR CODE GENERATION & PRINT ======================
let currentQRLink = '';

function generateQRCode() {
  const tableNo = document.getElementById("qrTableNum").value.trim();
  if (!tableNo) return alert("Please enter table number");

  const hostedUrl = window.location.href.split('?')[0];
  currentQRLink = `${hostedUrl}?mode=customer&table=${tableNo}`;

  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(currentQRLink)}`;

  document.getElementById("qrContainer").innerHTML = `
    <img src="${qrSrc}" style="width:280px;border:8px solid #d84315;border-radius:12px;">
    <p style="margin:10px 0;font-weight:bold;">Table ${tableNo} - Scan to Order</p>
  `;

  // Prepare for printing
  document.getElementById("printQRImage").innerHTML = `<img src="${qrSrc}" style="width:280px;">`;
  document.getElementById("printTableText").innerText = `Table ${tableNo}`;
}

function printQRCode() {
  if (!currentQRLink) {
    alert("Please generate QR code first!");
    return;
  }
  document.getElementById("printQRSection").style.display = "block";
  window.print();
  // Hide after print dialog closes (optional)
  setTimeout(() => {
    document.getElementById("printQRSection").style.display = "none";
  }, 1000);
}

// ====================== Rest of the code (Staff bill, Customer ordering, etc.) ======================
// (All other functions remain exactly the same as the previous version you had)

let bill = [];
let count = parseInt(localStorage.getItem("inv") || "1");
document.getElementById("invoice").value = "INV" + String(count).padStart(3, '0');

function addItem() {
  const idx = document.getElementById("item").value;
  if (idx === "") return alert("Select an item");
  const item = items[idx];
  const qty = parseInt(document.getElementById("qty").value) || 1;
  bill.push({...item, qty});
  renderBill();
}

// ... (voiceAdd, del, renderBill, customer ordering functions, live orders, saveBillWithSync, printBill, etc. remain unchanged)

function renderBill() {
  let html = "", total = 0;
  bill.forEach((b, i) => {
    let t = b.qty * b.price;
    total += t;
    html += `<tr><td>${b.name}</td><td>${b.qty}</td><td>₹${t}</td><td onclick="del(${i})" style="color:red;cursor:pointer;">❌</td></tr>`;
  });
  if (document.getElementById("gst").checked) total *= 1.05;
  document.getElementById("bill").innerHTML = html;
  document.getElementById("total").innerText = total.toFixed(2);
}

// Customer ordering functions (joinTable, loadCustomerMenu, etc.) - copy from previous version if needed
// For brevity, they are the same as last working version.

function initializeApp() {
  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get('mode');
  currentTable = urlParams.get('table') || '';

  if (mode === 'customer') {
    document.getElementById('staffView').style.display = 'none';
    document.getElementById('customerView').style.display = 'block';
    if (currentTable) document.getElementById('custTable').value = currentTable;
  } else {
    document.getElementById('staffView').style.display = 'block';
  }

  loadAndListenMenu();
}

initializeApp();

window.onbeforeunload = function() {
  localStorage.setItem("inv", ++count);
};
</script>
</body>
</html>
